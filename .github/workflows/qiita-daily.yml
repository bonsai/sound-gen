name: Qiita Daily Post

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'モード'
        required: true
        default: 'publish'
        type: choice
        options:
          - publish
          - update
          - update-all
          - check-updates
      publish_direct:
        description: '即公開（下書きでない）'
        required: false
        type: boolean
        default: false

env:
  QIITA_API_TOKEN: ${{ secrets.QIITA_API_TOKEN }}

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Publish next article (scheduled)
        if: github.event_name != 'workflow_dispatch'
        run: node pipeline/publish-scheduled.mjs
      - name: Workflow dispatch — publish
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'publish'
        run: node pipeline/publish-scheduled.mjs ${{ inputs.publish_direct == true && '--publish' || '' }}
      - name: Workflow dispatch — update
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'update'
        run: node pipeline/publish-scheduled.mjs --update --slow
      - name: Workflow dispatch — update-all
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'update-all'
        run: node pipeline/publish-scheduled.mjs --update-all --slow
      - name: Workflow dispatch — check-updates
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'check-updates'
        run: node pipeline/publish-scheduled.mjs --check-updates
      - name: Commit updated manifest
        if: github.event_name != 'workflow_dispatch' || inputs.mode != 'check-updates'
        run: |
          git config user.name "qiita-bot"
          git config user.email "qiita-bot@users.noreply.github.com"
          git add articles/manifest.json
          git diff --staged --quiet || git commit -m "chore: update manifest [skip ci]"
          git push