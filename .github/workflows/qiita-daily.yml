name: Qiita Daily Post

on:
  schedule:
    # 12:00 JST = 03:00 UTC
    - cron: '0 3 * * *'
    # 18:00 JST = 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      publish:
        description: '下書きでなく公開する'
        required: false
        type: boolean
        default: false

env:
  QIITA_API_TOKEN: ${{ secrets.QIITA_API_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Publish next article (draft)
        if: github.event_name != 'workflow_dispatch' || !inputs.publish
        run: node pipeline/publish-scheduled.mjs

      - name: Publish next article (public)
        if: github.event_name == 'workflow_dispatch' && inputs.publish
        run: node pipeline/publish-scheduled.mjs --publish

      - name: Commit updated manifest
        run: |
          git config user.name "qiita-bot"
          git config user.email "qiita-bot@users.noreply.github.com"
          git add articles/manifest.json
          git diff --staged --quiet || git commit -m "chore: update manifest [skip ci]"
          git push
